{# templates/_template.html #}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="utf-8" />
        <title>{% block title %}{% endblock %} - MetPredict</title>
        <meta name="description" content="{{ description }}" />
        <meta name="author" content="André Rendeiro" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
        <link rel="shortcut icon" href="{{ static_url }}/favicon.ico" />
        <link rel="canonical" href="{{ page_url }}" />
        <link rel="stylesheet" href="{{ static_url }}/css/style.css" />

        {% block head %}{% endblock %}
    </head>

    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">MetPredict</a>
            </div>
        </nav>

        <br /><br />

        <div class="container-lg">
            <div class="row">
                <div class="col-xs-12 col-md-12">
                    <div class="page-header">
                        <br />
                        <h1><a href="/">MetPredict</a></h1>
                    </div>
                </div>
            </div>

            <div class="row" id="content">
                {% block content %}{% endblock %}
                <br />
            </div>
            <br />
        </div>
        <br />

        <nav class="navbar fixed-bottom bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="/"></a>
                <small>
                    Funded by <a href="https://wwtf.at/funding/programmes/ls/" target="_blank">WWTF LS23-067</a>
                </small>
            </div>
        </nav>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </body>
</html>
