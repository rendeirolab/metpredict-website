{% extends "_template.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="col-xs-12 col-md-12">
    <p><a href="/news/">&larr; Back to News</a></p>
    <h2>{{ title }}</h2>
    <small class="text-muted">{{ date }}</small>
    <hr />
</div>

<div class="col-xs-12 col-md-12">
    {% for block in body %}
    {% if block.type == "text" %}
    <p>{{ block.content }}</p>
    {% elif block.type == "image" %}
    <figure class="figure my-3">
        <img src="{{ block.url | asset_url }}" alt="{{ block.alt }}" class="figure-img rounded" style="max-width: 700px; max-height: 700px; width: auto; height: auto;" />
        {% if block.caption %}
        <figcaption class="figure-caption">{{ block.caption }}</figcaption>
        {% endif %}
    </figure>
    {% endif %}
    {% endfor %}
</div>
{% endblock %}
