index:
  description: "A WWTF-funded collaboration on prediction of metastatic potential."
  summary: "MetPredict is a research project investigating why some breast cancers spread to other organs while others don't — a critical question given that around 30% of breast cancer patients ultimately develop metastasis. The project focuses on how the tissue microenvironment and metastatic niche influence cancer spread, using histopathology, spatial profiling, high-dimensional imaging, and AI-based analysis to map tumor cell interactions. The goal is to identify predictive biomarkers, flag high-risk patients, and uncover new strategies to prevent or treat metastasis."
  title: "MetPredict"
  intro:
    - "MetPredict is a WWTF-funded collaboration (LS23-067) between the groups of Juliane Winkler, Andre Rendeiro, and Zsuzsanna Bago-Horvath working on prediction of metastatic potential."
