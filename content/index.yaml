index:
  description: "A WWTF-funded collaboration on prediction of metastatic potential."
  summary: "The vast majority of cancer patients die from metastasis, which is the spread of tumor cells to different sites in the body. While patients with breast cancer have effective treatment options available, about 30% of breast cancer patients will eventually develop metastasis. Our project MetPredict studies why some breast cancers spread to other organs, while others don’t. We hypothesize that the tissue microenvironment and the anatomical arrangements in the metastatic niche play a crucial role in the establishment of clinical manifested metastasis. In this project, we aim to identify cellular and tissue-level features that predict metastatic progression. By integrating histopathology, spatial profiling, high-dimensional imaging, and AI/machine learning-based analysis, the project will map how tumor cells interact with immune, stromal, and extracellular matrix components of the microenvironment during metastasis. This cutting-edge approach seeks to discover predictive biomarkers, identify patients at high risk and discover new ways to prevent or treat metastasis."
  title: "MetPredict"
  intro:
    - "MetPredict is a WWTF-funded collaboration (LS23-067) between the groups of Juliane Winkler, Andre Rendeiro, and Zsuzsanna Bago-Horvath working on prediction of metastatic potential."
